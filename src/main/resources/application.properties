spring.application.name=ecommerce

# Default local datasource. Use the mysql profile for a real MySQL database.
spring.datasource.url=jdbc:h2:mem:ecommerce;MODE=MySQL;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

project.image=images/

spring.sql.init.mode=never

spring.app.jwtSecret=${JWT_SECRET:ZGV2LWp3dC1zZWNyZXQta2V5LWZvci1sb2NhbC11c2Utb25seS0xMjM0NTY3ODkw}
spring.app.jwtExpirationMs=${JWT_EXPIRATION_MS:86400000}
spring.app.jwtCookieName=springBootEcom
server.port=8080


logging.level.org.springframework=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.example.ecommerce=DEBUG
